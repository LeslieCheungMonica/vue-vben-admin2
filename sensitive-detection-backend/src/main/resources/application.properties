server.port=8001
server.servlet.context-path=/api/native-security

# Security login configuration
security.login.users.admin=admin123
security.login.users.operator=operator123
security.login.aes-key=DemoAesKey2026!!
security.login.token-expire-hours=24

# H2 Database
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:sec_demo
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Jackson
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

